services:
  - type: web
    name: barber-backend
    runtime: python
    buildCommand: cd backend && poetry install
    startCommand: cd backend && .venv/bin/python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: POETRY_VIRTUALENVS_IN_PROJECT
        value: "true"
