services:
  - type: web
    name: barber-backend
    runtime: python
    rootDir: backend
    plan: free
    healthCheckPath: /health
    buildCommand: bash render-build.sh
    startCommand: bash render-start.sh
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        value: https://barber-fron-gilt.vercel.app
      - key: CORS_ALLOWED_ORIGIN_REGEX
        value: https://.*\.vercel\.app
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: POETRY_VIRTUALENVS_IN_PROJECT
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
