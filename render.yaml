services:
  - type: web
    name: barber-backend
    runtime: python
    buildCommand: cd backend && poetry install --no-root
    startCommand: cd backend && poetry run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: POETRY_VIRTUALENVS_IN_PROJECT
        value: "true"
